<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <style>
    @font-face {
      font-family: "Manrope";
      src: url("assets/fonts/Manrope-Bold.woff") format("woff");
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: "Inter";
      src: url("assets/fonts/Inter-Regular.woff") format("woff");
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: "Inter";
      src: url("assets/fonts/Inter-Bold.woff") format("woff");
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: "JetBrains Mono";
      src: url("assets/fonts/JetBrainsMono-Regular.woff") format("woff");
      font-weight: 400;
      font-style: normal;
    }

    :root {
      --paper: {{paper_bg}};
      --gold: {{frame_gold}};
      --accent: {{accent_color}};
      --ink: #1a1a1a;
      --muted: #5c5c5c;
      --card-w: {{width}}px;
      --card-h: {{height}}px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: var(--card-w);
      height: var(--card-h);
      min-width: var(--card-w);
      min-height: var(--card-h);
      max-width: var(--card-w);
      max-height: var(--card-h);
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: "Inter", sans-serif;
      color: var(--ink);
    }

    .card {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--paper);
      background-image: url("assets/paper.png");
      background-size: 512px 512px;
      border: 6px solid var(--gold);
      border-radius: 28px;
      padding: 70px 36px;
      display: grid;
      grid-template-areas:
        "hd"
        "art"
        "id"
        "copy"
        "stats"
        "ft";
      gap: 16px;
    }

    .card.legendary {
      border-color: #E0B23C;
      box-shadow:
        0 0 28px rgba(224, 178, 60, 0.35),
        inset 0 0 0 2px rgba(255, 215, 120, 0.45);
    }

    .card.legendary .art-window {
      border-color: #E8C45A;
      box-shadow: inset 0 0 16px rgba(224, 178, 60, 0.2);
    }

    .card.rarity-common {
      border-color: #8B939C;
      background-color: #EEEBE6;
    }

    .card.rarity-common .art-window {
      border-color: #9CA3AF;
    }

    .card.card-weird .art-brand-plaque {
      background: linear-gradient(155deg, #ffe0f0 0%, #ff3d9a 45%, #4a1030 100%);
    }

    .weird-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      border-radius: 999px;
      background: var(--accent);
      border: 3px solid #ffffff;
      transform: rotate(-6deg);
      box-shadow:
        0 6px 18px rgba(255, 61, 154, 0.45),
        0 2px 0 rgba(0, 0, 0, 0.08);
    }

    .weird-star {
      font-size: 26px;
      color: #ffffff;
      line-height: 1;
      font-weight: 700;
    }

    .weird-label {
      font-family: "Inter", sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: #ffffff;
      white-space: nowrap;
      text-transform: uppercase;
    }

    .card.card-weird .slide-headline {
      padding-bottom: 10px;
      border-bottom: 4px solid var(--accent);
    }

    .card.card-weird .tagline-gem {
      color: var(--accent);
    }

    .card-body { display: contents; }

    .header {
      grid-area: hd;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      min-height: 0;
    }

    .brand-corner {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    .logo {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .brand-text {
      font-family: "Manrope", sans-serif;
      font-weight: 700;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .rarity-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 12px;
      background: color-mix(in srgb, var(--accent) 10%, white);
      border: 2px solid color-mix(in srgb, var(--accent) 32%, transparent);
    }

    .rarity-stars {
      display: flex;
      gap: 2px;
      font-size: 16px;
      color: var(--accent);
      line-height: 1;
    }

    .rarity-stars .dim { opacity: 0.25; }

    .rarity-label {
      font-family: "Inter", sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--accent);
      white-space: nowrap;
    }

    .card-number {
      font-family: "JetBrains Mono", monospace;
      font-size: 18px;
      color: var(--muted);
    }

    .hero-row {
      grid-area: art;
      min-height: 0;
    }

    .art-window {
      width: 100%;
      height: 100%;
      background: #0f1117;
      border: 3px solid var(--gold);
      border-radius: 14px;
      overflow: hidden;
      position: relative;
    }

    .art-window > img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center top;
    }

    .art-brand-plaque {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 28px;
      background: linear-gradient(155deg, #e8ebf2 0%, #6b7280 42%, #1c2130 100%);
    }

    .card.rarity-common .art-brand-plaque {
      background: linear-gradient(155deg, #f0eeea 0%, #9ca3af 40%, #3d4249 100%);
    }

    .card.rarity-uncommon .art-brand-plaque {
      background: linear-gradient(155deg, #dff5eb 0%, #3ba776 42%, #1a3d2e 100%);
    }

    .card.rarity-rare .art-brand-plaque {
      background: linear-gradient(155deg, #dce9ff 0%, #3b82f6 42%, #152a52 100%);
    }

    .card.rarity-epic .art-brand-plaque {
      background: linear-gradient(155deg, #ece4ff 0%, #7c5cff 42%, #2a1a5c 100%);
    }

    .card.legendary .art-brand-plaque {
      background: linear-gradient(155deg, #fff2cc 0%, #e0b23c 40%, #4a3810 100%);
    }

    .plaque-nugget {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      object-fit: cover;
    }

    .plaque-name {
      font-family: "Manrope", sans-serif;
      font-weight: 700;
      font-size: 44px;
      line-height: 1.05;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
      letter-spacing: -0.02em;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .plaque-lang {
      font-family: "JetBrains Mono", monospace;
      font-size: 18px;
      color: rgba(255, 255, 255, 0.8);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .identity-block {
      grid-area: id;
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 0;
    }

    .repo-path {
      font-family: "JetBrains Mono", monospace;
      font-size: 26px;
      line-height: 1.2;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .repo-name {
      font-family: "Manrope", sans-serif;
      font-weight: 700;
      font-size: 88px;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .meta-line {
      font-family: "Inter", sans-serif;
      font-size: 28px;
      line-height: 1.2;
      color: var(--muted);
      margin-top: 12px;
    }

    .description-block {
      grid-area: copy;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
      max-height: 100%;
      overflow: hidden;
      justify-content: flex-start;
    }

    .slide-headline {
      font-family: "Inter", sans-serif;
      font-size: 50px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      flex-shrink: 0;
      overflow: hidden;
    }

    .slide-body {
      font-size: 44px;
      line-height: 1.35;
      font-weight: 400;
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .slide-body.truncated {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .stats-line {
      grid-area: stats;
      font-family: "Inter", sans-serif;
      font-size: 30px;
      line-height: 1.2;
      color: var(--muted);
      letter-spacing: 0.01em;
      align-self: end;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .stats-line .accent {
      color: var(--accent);
      font-weight: 700;
    }

    .footer {
      grid-area: ft;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      min-height: 0;
    }

    .tagline {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 22px;
      color: var(--muted);
    }

    .tagline-gem {
      color: var(--accent);
      font-size: 18px;
      line-height: 1;
    }

    .handle {
      font-family: "Manrope", sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--accent);
      flex-shrink: 0;
    }

    /* --- carousel 1080×1350 --- */
    .card.format-carousel {
      width: 1080px;
      height: 1350px;
      min-width: 1080px;
      min-height: 1350px;
      max-width: 1080px;
      max-height: 1350px;
      padding: 70px 36px;
      grid-template-rows: 56px 380px auto minmax(0, 420px) 44px 40px;
      row-gap: 16px;
    }

    .card.format-carousel .hero-row {
      height: 380px;
      max-height: 380px;
    }

    /* --- reel 1080×1920 --- */
    .card.format-reel {
      width: 1080px;
      height: 1920px;
      min-width: 1080px;
      min-height: 1920px;
      max-width: 1080px;
      max-height: 1920px;
      padding: 80px 36px 280px 36px;
      gap: 14px;
      grid-template-rows: 56px 720px auto minmax(0, 480px) 32px 40px;
      row-gap: 14px;
    }

    .card.format-reel .hero-row {
      height: 720px;
      max-height: 720px;
    }

    .card.format-reel .logo {
      width: 56px;
      height: 56px;
    }

    .card.format-reel .brand-text {
      font-size: 26px;
    }

    .card.format-reel .rarity-stars {
      font-size: 17px;
    }

    .card.format-reel .rarity-label {
      font-size: 14px;
    }

    .card.format-reel .card-number {
      font-size: 20px;
    }

    .card.format-reel .plaque-nugget {
      width: 72px;
      height: 72px;
    }

    .card.format-reel .plaque-name {
      font-size: 52px;
    }

    .card.format-reel .plaque-lang {
      font-size: 20px;
    }

    .card.format-reel .repo-path {
      font-size: 28px;
    }

    .card.format-reel .repo-name {
      font-size: 96px;
      line-height: 1.05;
    }

    .card.format-reel .meta-line {
      font-size: 30px;
      margin-top: 12px;
    }

    .card.format-reel .description-block {
      gap: 14px;
      overflow: hidden;
    }

    .card.format-reel .slide-headline {
      font-size: 54px;
      line-height: 1.2;
    }

    .card.format-reel .slide-body {
      font-size: 48px;
      line-height: 1.35;
      overflow: hidden;
    }

    .card.format-reel .stats-line {
      font-size: 32px;
    }

    .card.format-reel .tagline {
      font-size: 24px;
    }

    .card.format-reel .handle {
      font-size: 24px;
    }
  </style>
</head>
<body>
  <div class="card {{card_rarity_classes}} {{format_class}}">
    <header class="header">
      <div class="brand-corner">
        <img class="logo" src="assets/logo.png" alt="" />
        <div class="brand-text">{{brand_name}}</div>
      </div>
      <div class="header-right">
        {{header_badge_html}}
        <div class="card-number">#{{card_number}}</div>
      </div>
    </header>

    <div class="card-body">
      <div class="hero-row">
        <div class="art-window">
          {{screenshot_html}}
        </div>
      </div>

      <div class="identity-block">
        <div class="repo-path">{{repo_full_name}}</div>
        <div class="repo-name">{{repo_name}}</div>
        <div class="meta-line">{{meta_line}}</div>
      </div>

      <div class="description-block">
        <p class="slide-headline">{{slide_headline}}</p>
        <p class="slide-body">{{slide_body}}</p>
      </div>

      <div class="stats-line">{{stats_line}}</div>
    </div>

    <footer class="footer">
      <div class="tagline">
        <span class="tagline-gem">◆</span>
        <span>{{brand_tagline}}</span>
      </div>
      <div class="handle">{{brand_handle}}</div>
    </footer>
  </div>
  <script>
    (function fitCardCopy() {
      const card = document.querySelector('.card');
      const block = document.querySelector('.description-block');
      const headline = document.querySelector('.slide-headline');
      const body = document.querySelector('.slide-body');
      const stats = document.querySelector('.stats-line');
      if (!card || !block || !headline || !body || !stats) return;

      const isReel = card.classList.contains('format-reel');
      const minBody = 36;
      const minHead = 40;
      let bodyPx = isReel ? 48 : 44;
      let headPx = isReel ? 54 : 50;

      function gapOk() {
        const br = block.getBoundingClientRect();
        const sr = stats.getBoundingClientRect();
        return sr.top - br.bottom >= 10;
      }

      function contentOverflow() {
        return (
          block.scrollHeight > block.clientHeight + 2 ||
          body.scrollHeight > body.clientHeight + 2 ||
          !gapOk()
        );
      }

      function applySizes() {
        body.style.fontSize = bodyPx + 'px';
        headline.style.fontSize = headPx + 'px';
        body.classList.remove('truncated');
        body.style.webkitLineClamp = '';
        body.style.display = '';
      }

      applySizes();
      while (contentOverflow() && bodyPx > minBody) {
        bodyPx -= 2;
        headPx = Math.max(minHead, headPx - 2);
        applySizes();
      }

      if (contentOverflow()) {
        body.classList.add('truncated');
        let lines = 8;
        while (contentOverflow() && lines > 2) {
          lines -= 1;
          body.style.display = '-webkit-box';
          body.style.webkitBoxOrient = 'vertical';
          body.style.webkitLineClamp = String(lines);
        }
      }

      document.body.dataset.fitBodyPx = String(bodyPx);
      document.body.dataset.textFits = contentOverflow() ? '0' : '1';
      document.body.dataset.textTruncated = body.classList.contains('truncated') ? '1' : '0';
    })();
  </script>
</body>
</html>
